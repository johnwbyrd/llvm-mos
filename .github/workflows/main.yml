name: llvm-mos
on: [push]
env:
  
  ninja-ubuntu-latest: apt-get install ninja-build
  ninja-windows-latest: choco install ninja
  ninja-macOS-latest: brew install ninja
  
  mkdir-ubuntu-latest: mkdir -p 
  mkdir-windows-latest: mkdir 
  mkdir-macOS-latest: mkdir -p
  
  stage1-cmake-flags: ../../llvm -G Ninja -DLLVM_TARGETS_TO_BUILD="X86" -DLLVM_EXPERIMENTAL_TARGETS_TO_BUILD="MOS" -DCMAKE_BUILD_TYPE=Release -DLLVM_OPTIMIZED_TABLEGEN=1 -DCMAKE_INSTALL_PREFIX=./install 

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest, macOS-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Install prerequisites
      run: |
        ninja-${{ matrix.os }}
    - uses: actions/checkout@v1
    - name: Create stage1 compiler build environment
      run: |
        mkdir-${{ matrix.os }} build/stage1/install
        cd build/stage1
        cmake ${{ stage1-cmake-flags }}
    - name: Build stage1 compiler
      run: |   
        cd build/stage1     
        cmake --build . --target install --config Release
